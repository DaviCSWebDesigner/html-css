<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Imagens no Site</title>
</head>
<body>
    <h1>Testando Carga de Imagens</h1>
    <p>
        Você vai ver uma imagem que está na mesma pasta.
    </p>
    <img src="logo-html.png" alt="Logo HTML5">
    <p>
        Podemos também carregar imagens que estão em pastas diferentes, ou seja, não estão no mesmo local do arquivo.
    </p>
    <img src="imagens/logo-css.png" alt="Logo CSS3">
    <p>
        Também podemos carregar imagens externas ao nosso arquivo, de um site, por exemplo:
    </p>
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/JavaScript-logo.png" width="200" height="180" alt="Logo JAVASCRIPT">
</body>
</html>
