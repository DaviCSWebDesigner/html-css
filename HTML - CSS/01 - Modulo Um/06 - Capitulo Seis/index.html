<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatação de Texto - Negrito e Itálico</title>
</head>
<body>
    <h1>
        Principais Formatações
    </h1>
    <h2>
        Negrito / Destaque
    </h2>
    <p>
        Nesta frase temos uma palavra em <b>negrito</b> usando a tag &lt; b &gt;, <b>(não semântica)</b>.
    </p>
    <p>
        Nesta frase temos um termo em <strong>destaque</strong> usando a tag &lt; strong &gt;, <strong>(semântica)</strong>.
    </p>
</body>
</html>
